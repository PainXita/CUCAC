<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ALL TTS VOICE HUB</title>
<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: white;
    text-align: center;
}

textarea {
    width: 90%;
    height: 120px;
    font-size: 16px;
    padding: 10px;
    border-radius: 10px;
}

select, button, input {
    margin: 6px;
    padding: 10px;
    border-radius: 8px;
}

button {
    background: #00e0ff;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.box {
    background: #1c1c1c;
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
}
</style>
</head>

<body>

<h2>🔥 ALL TTS VOICE HUB (VIP)</h2>

<div class="box">

<textarea id="text">Nhập văn bản...</textarea>

<br>

<select id="provider">
    <option value="browser">🌐 Browser Voice (miễn phí)</option>
    <option value="google">🇬🇺 Google Cloud TTS</option>
    <option value="azure">🟦 Microsoft Azure TTS</option>
    <option value="eleven">🤖 ElevenLabs AI Voice</option>
    <option value="tiktok">🎵 TikTok Style Voice</option>
</select>

<br>

<select id="voiceList"></select>

<br>

<button onclick="loadVoices()">🔄 Load Voice</button>
<button onclick="speak()">🔊 Play</button>
<button onclick="stop()">⛔ Stop</button>

</div>

<div class="box">
<h3>⚙️ API SETUP (optional)</h3>
<p>Google / Azure / ElevenLabs cần API key</p>

<input id="apiKey" placeholder="Nhập API Key (nếu có)" style="width:90%">
</div>

<script>
let voices = [];

function loadVoices(){
    voices = speechSynthesis.getVoices();
    let v = document.getElementById("voiceList");
    v.innerHTML = "";

    voices.forEach((voice, i)=>{
        let opt = document.createElement("option");
        opt.value = i;
        opt.innerHTML = voice.name + " | " + voice.lang;
        v.appendChild(opt);
    });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak(){
    let text = document.getElementById("text").value;
    let provider = document.getElementById("provider").value;

    if(provider === "browser"){
        let u = new SpeechSynthesisUtterance(text);
        let vIndex = document.getElementById("voiceList").value;
        u.voice = voices[vIndex];
        speechSynthesis.speak(u);
    }

    else if(provider === "google"){
        alert("Google TTS cần backend + API key (mình có thể code Node.js cho bạn)");
    }

    else if(provider === "azure"){
        alert("Azure TTS cần key + endpoint");
    }

    else if(provider === "eleven"){
        alert("ElevenLabs AI Voice cần API key (giọng rất thật)");
    }

    else if(provider === "tiktok"){
        let u = new SpeechSynthesisUtterance(text);
        u.rate = 1.2;
        u.pitch = 1.6;
        speechSynthesis.speak(u);
    }
}

function stop(){
    speechSynthesis.cancel();
}

loadVoices();
</script>

</body>
</html>
